<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<style>
  body {
    margin: 0; padding: 0; background-color: #111;
    display: flex; justify-content: center; align-items: center;
    height: 100vh; font-family: sans-serif;
  }
  #phone {
    width: 360px; height: 720px; background-color: #000;
    border-radius: 40px; border: 12px solid #555;
    position: relative; overflow: hidden;
    box-shadow: 0 20px 50px rgba(0,0,0,0.8);
  }
  /* The Paper Strip */
  #paper {
    position: absolute; width: 220px; height: 3000px;
    background-color: #f7f7f7; left: 70px; top: -1900px;
    border-left: 2px dashed #bbb; border-right: 2px dashed #bbb;
    pointer-events: none;
    box-shadow: 0 0 30px rgba(0,0,0,0.5);
  }
  .lane-line {
    position: absolute; width: 1px; height: 100%; background: #ddd; top: 0;
  }
  .dot {
    position: absolute; width: 18px; height: 18px; background: #000;
    border-radius: 50%; transform: translate(-50%, -50%);
  }
  /* The Playhead */
  #playhead-line {
    position: absolute; top: 360px; left: 0; width: 100%; height: 2px;
    background: rgba(255, 80, 80, 0.9); z-index: 10;
  }
  .sensor {
    position: absolute; width: 36px; height: 36px;
    border-radius: 50%; top: 342px; z-index: 11;
    border: 2px solid rgba(255,255,255,0.4);
    display: flex; justify-content: center; align-items: center;
    color: white; font-weight: bold; font-size: 15px;
    transition: all 0.1s ease-out;
  }
  .sensor.active {
    transform: scale(1.3);
    box-shadow: 0 0 20px currentColor, inset 0 0 10px currentColor;
    border-width: 3px;
    color: #fff !important;
  }
  
  #header {
    position: absolute; top: 30px; left: 50%; transform: translateX(-50%);
    background: rgba(0,0,0,0.6); color: #fff; padding: 10px 20px;
    border-radius: 20px; font-size: 15px; z-index: 20; border: 1px solid rgba(255,255,255,0.2);
    white-space: nowrap; font-weight: bold;
    backdrop-filter: blur(10px);
  }
  .tuning {
    position: absolute; bottom: 30px; left: 20px; right: 20px;
    background: rgba(0,0,0,0.7); border: 1px solid rgba(255,255,255,0.15);
    border-radius: 16px; padding: 20px; z-index: 20; color: #fff;
    backdrop-filter: blur(10px);
  }
</style>
</head>
<body>

<div id="phone">
  <div id="header">🎵 Optical Music Box</div>
  
  <div id="paper"></div>
  <div id="playhead-line"></div>
  
  <!-- Sensors -->
  <div class="tuning">
    <div style="font-size: 13px; color: #ccc; font-weight: bold; margin-bottom: 20px;">Tuning Controls</div>
    <div style="height: 4px; background: rgba(255,255,255,0.3); width: 80%; margin: 15px 0; border-radius: 2px; position:relative;">
        <div style="position:absolute; width:12px; height:12px; background:white; border-radius:50%; top:-4px; left:30%;"></div>
    </div>
    <div style="height: 4px; background: rgba(255,255,255,0.3); width: 90%; margin: 15px 0; border-radius: 2px; position:relative;">
        <div style="position:absolute; width:12px; height:12px; background:white; border-radius:50%; top:-4px; left:60%;"></div>
    </div>
    <div style="height: 4px; background: rgba(255,255,255,0.3); width: 70%; margin: 15px 0; border-radius: 2px; position:relative;">
        <div style="position:absolute; width:12px; height:12px; background:white; border-radius:50%; top:-4px; left:50%;"></div>
    </div>
  </div>
</div>

<script>
  const paper = document.getElementById('paper');
  const phone = document.getElementById('phone');
  
  // Lanes based on 220px width paper strip
  const lanes = { 'A': 30, 'G': 70, 'E': 110, 'D': 150, 'C': 190 };
  const colors = { 'A': '#FF5252', 'G': '#FF9800', 'E': '#FFEB3B', 'D': '#4CAF50', 'C': '#29B6F6' };
  
  // Draw Lines
  for (let l in lanes) {
    let div = document.createElement('div');
    div.className = 'lane-line'; div.style.left = lanes[l] + 'px';
    paper.appendChild(div);
  }
  
  // Create Sensors
  const sensors = {};
  for (let l in lanes) {
    let s = document.createElement('div');
    s.className = 'sensor';
    s.style.left = (70 + lanes[l] - 18) + 'px';
    s.textContent = l;
    s.style.color = colors[l];
    s.style.borderColor = colors[l];
    phone.appendChild(s);
    sensors[l] = s;
  }

  const twinkle = [
    ['C', 1], ['C', 1], ['G', 1], ['G', 1], ['A', 1], ['A', 1], ['G', 2],
    ['E', 1], ['E', 1], ['E', 1], ['E', 1], ['D', 1], ['D', 1], ['C', 2],
    ['G', 1], ['G', 1], ['E', 1], ['E', 1], ['E', 1], ['E', 1], ['D', 2]
  ];
  
  let currentY = 2700; // Bottom of the 3000px strip
  const unitSpacing = 80; // Distance
  const dotElements = [];
  
  for (let note of twinkle) {
    let key = note[0]; let dur = note[1];
    let d = document.createElement('div');
    d.className = 'dot';
    d.style.left = lanes[key] + 'px';
    d.style.top = currentY + 'px';
    d.dataset.key = key;
    paper.appendChild(d);
    dotElements.push(d);
    currentY -= (dur * unitSpacing);
  }
  
  let paperY = -2300; 
  let lastTime = 0;
  
  function animate(t) {
    if (!lastTime) lastTime = t;
    let dt = t - lastTime;
    lastTime = t;
    
    // Slow initial pause to let viewer see the UI, then start moving
    if (t > 1500) {
        paperY += (dt * 0.18);
        paper.style.top = paperY + 'px';
    }
    
    for (let l in sensors) {
      sensors[l].classList.remove('active');
      sensors[l].style.backgroundColor = 'transparent';
      sensors[l].style.color = colors[l];
    }
    
    for (let d of dotElements) {
       let dotTop = parseInt(d.style.top);
       let screenY = paperY + dotTop;
       
       // Playhead intersection
       if (screenY > 350 && screenY < 370) {
           let key = d.dataset.key;
           sensors[key].classList.add('active');
           sensors[key].style.backgroundColor = colors[key]; 
       }
    }
    
    if (paperY < 800) {
      requestAnimationFrame(animate);
    }
  }
  requestAnimationFrame(animate);
</script>
</body>
</html>
